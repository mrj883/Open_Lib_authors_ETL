
volumes:
  kestra_data:
    driver: local
  kestra_tmp:
    driver: local

services:
  # pgadmin remains for managing your Cloud SQL instance via its IP
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=mrj9893@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=${PG_ADMIN_PASSWORD}
    ports:
      - "8085:80"

  kestra:
    image: kestra/kestra:v1.1
    pull_policy: always
    user: "root"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_tmp:/tmp/kestra-wd
      # Removed the BigQuery/GCP credentials volume mount
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://172.30.64.3:5432/kestra-db
            driverClassName: org.postgresql.Driver
            username: Kestra_user
            password: Tony@stark9893
        
        kestra:
          server:
            basicAuth:
              enabled: true
              username: "mrj9893@gmail.com"
              password: Admin1234!
          
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"